server:
  port: ${PORT:8080}

spring:
  application:
    name: rehab-center-api

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Database configuration (SQL Server)
  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:rehab_center_db};encrypt=true;trustServerCertificate=true;characterEncoding=UTF-8
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  # JPA & Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Cloudinary file storage
cloudinary:
  url: ${CLOUDINARY_URL:}
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  handover-decision-folder: ${CLOUDINARY_HANDOVER_DECISION_FOLDER:rehab-center/handover-decisions}

# Custom Security & JWT Configuration
application:
  security:
    jwt:
      # Base64 encoded secret key (Must be at least 256 bits / 32 bytes)
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      # Token expiration: 1 day in milliseconds (24 * 60 * 60 * 1000)
      expiration: ${JWT_EXPIRATION:86400000}

# Swagger UI configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
