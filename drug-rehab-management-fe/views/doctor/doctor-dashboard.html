<div class="page-header page-header-row">
    <div>
        <h1>Xin chào, <span id="dash-user-name">Bác sĩ</span> 👋</h1>
        <p id="dash-subtitle">Hôm nay là một ngày tuyệt vời để theo dõi sức khỏe học viên.</p>
    </div>
    <div class="dash-date-card">
        <div id="dash-date-num" class="dash-date-num"></div>
        <div id="dash-date-label" class="dash-date-label"></div>
    </div>
</div>

<div class="stats-grid" id="dash-stats">
    <!-- Stat cards will be rendered here -->
</div>

<div class="dashboard-content-grid">
    <!-- Recent records card -->
    <div class="card">
        <div class="card-header">
            <div>
                <div class="card-title">
                    <div class="card-title-icon"><i class="fa-solid fa-file-medical"></i></div>
                    Hồ sơ bệnh án mới nhất
                </div>
                <div class="card-header-meta">Các hồ sơ được cập nhật gần đây</div>
            </div>
            <button class="btn btn-sm btn-outline" onclick="Router.navigate('/medical-records')">
                <i class="fa-solid fa-arrow-right"></i> Xem tất cả
            </button>
        </div>
        <div class="card-body">
            <div class="recent-list" id="dash-recent-list"></div>
        </div>
    </div>

    <!-- Right column -->
    <div style="display:flex; flex-direction:column; gap:1.25rem;">
        <!-- Chart card -->
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">
                        <div class="card-title-icon" style="background:rgba(99,102,241,0.12);color:#6366f1;">
                            <i class="fa-solid fa-chart-column"></i>
                        </div>
                        Hoạt động tiếp nhận
                    </div>
                    <div class="card-header-meta">7 ngày qua</div>
                </div>
            </div>
            <div class="card-body" id="dash-chart"></div>
        </div>

        <!-- Quick actions card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-title-icon" style="background:rgba(16,185,129,0.12);color:#10b981;">
                        <i class="fa-solid fa-bolt"></i>
                    </div>
                    Thao tác nhanh
                </div>
            </div>
            <div class="card-body">
                <div class="quick-actions">
                    <a href="#" onclick="Router.navigate('/medical-records'); return false;" class="quick-action-btn">
                        <div class="qa-icon blue"><i class="fa-solid fa-magnifying-glass"></i></div>
                        <div>
                            <div class="qa-text">Tra cứu</div>
                            <div class="qa-sub">Hồ sơ bệnh án</div>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="margin-left:auto;color:var(--text-muted);font-size:11px;"></i>
                    </a>
                    <a href="#" class="quick-action-btn">
                        <div class="qa-icon green"><i class="fa-solid fa-file-signature"></i></div>
                        <div>
                            <div class="qa-text">Báo cáo</div>
                            <div class="qa-sub">Xuất dữ liệu</div>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="margin-left:auto;color:var(--text-muted);font-size:11px;"></i>
                    </a>
                    <a href="#" class="quick-action-btn">
                        <div class="qa-icon purple"><i class="fa-solid fa-notes-medical"></i></div>
                        <div>
                            <div class="qa-text">Nhật ký điều trị</div>
                            <div class="qa-sub">Cập nhật phác đồ</div>
                        </div>
                        <i class="fa-solid fa-chevron-right" style="margin-left:auto;color:var(--text-muted);font-size:11px;"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
