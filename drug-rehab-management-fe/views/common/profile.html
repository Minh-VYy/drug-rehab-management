<div class="page-header">
    <div>
        <h1>Thông tin <span>cá nhân</span></h1>
        <p>Quản lý thông tin tài khoản và cài đặt bảo mật</p>
    </div>
</div>

<!-- Profile Grid -->
<div class="profile-grid-container" style="display:grid; grid-template-columns:320px 1fr; gap:24px; margin-bottom:24px; align-items: start;">

    <!-- Left Sidebar (User Card + Tab Nav) -->
    <div class="profile-sidebar" style="display:flex; flex-direction:column; gap:20px;">
        
        <!-- User Summary Card -->
        <div class="card">
            <div class="card-body" style="text-align:center; padding:32px 24px;">
                <!-- Interactive Avatar with Edit Overlay -->
                <div class="profile-avatar-lg" id="profileAvatarWrapper" style="width:120px; height:120px; border-radius:50%; margin:0 auto 20px; position:relative; overflow:hidden; cursor:pointer;">
                    <div id="profileAvatarLarge" style="width:100%; height:100%; background:linear-gradient(135deg, var(--primary-light), var(--accent)); display:flex; align-items:center; justify-content:center; font-size:44px; font-weight:800; color:#fff; box-shadow:0 8px 24px rgba(59,130,246,0.25);">
                        --
                    </div>
                    <img id="profileAvatarImage" style="width:100%; height:100%; object-fit:cover; display:none;" alt="Avatar">
                    <div class="profile-avatar-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; color:#fff; opacity:0; transition:opacity 0.25s ease;" title="Thay đổi ảnh đại diện">
                        <i class="fa-solid fa-camera" style="font-size:24px;"></i>
                    </div>
                </div>
                <!-- Hidden Avatar Input -->
                <input type="file" id="avatarInput" style="display:none;" accept="image/*">

                <h2 style="font-size:20px; font-weight:700; color:var(--text-primary); margin-bottom:6px;" id="profileFullName">--</h2>
                <div style="display:inline-block; margin-bottom:20px;">
                    <span class="badge badge-blue" id="profileRoleBadge">--</span>
                </div>

                <div style="background:var(--surface-2); padding:16px; border-radius:var(--radius-md); text-align:left;">
                    <div style="display:grid; gap:12px;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div style="width:32px; height:32px; background:rgba(59,130,246,0.12); border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--primary);">
                                <i class="fa-solid fa-at"></i>
                            </div>
                            <div style="flex:1; min-width:0;">
                                <div style="font-size:11px; color:var(--text-muted); font-weight:600;">Tên đăng nhập</div>
                                <div style="font-size:13px; font-weight:600; color:var(--text-primary); overflow:hidden; text-overflow:ellipsis;" id="profileUsername">--</div>
                            </div>
                        </div>

                        <div style="display:flex; align-items:center; gap:10px;">
                            <div style="width:32px; height:32px; background:rgba(16,185,129,0.12); border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--success);">
                                <i class="fa-solid fa-circle-check"></i>
                            </div>
                            <div style="flex:1; min-width:0;">
                                <div style="font-size:11px; color:var(--text-muted); font-weight:600;">Trạng thái</div>
                                <div style="font-size:13px; font-weight:600;">
                                    <span class="badge badge-green">Đang hoạt động</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Content Panel -->
    <div class="profile-content-panel">

        <!-- Tab 1: Thông tin cá nhân -->
        <div class="profile-tab-content active" id="tab-info">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-title-icon" style="background:rgba(59,130,246,0.12); color:var(--primary); border-color:rgba(59,130,246,0.2);">
                            <i class="fa-solid fa-user-pen"></i>
                        </div>
                        Thông tin cá nhân
                    </div>
                </div>
                <div class="card-body" style="padding:24px;">
                    <form id="formEditProfile" onsubmit="return false;">
                        <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; margin-bottom:20px;">
                            <div class="form-group">
                                <label class="form-label" style="font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;">Họ và tên <span style="color:var(--danger)">*</span></label>
                                <input type="text" class="form-control" id="formFullName" placeholder="Nhập họ tên đầy đủ" required style="width:100%;" />
                            </div>

                            <div class="form-group">
                                <label class="form-label" style="font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;">Số điện thoại</label>
                                <input type="text" class="form-control" id="formPhone" placeholder="VD: 0905123456" maxlength="10" style="width:100%;" />
                            </div>
                        </div>

                        <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:20px; margin-bottom:20px;">
                            <div class="form-group">
                                <label class="form-label" style="font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;">Email <span style="color:var(--danger)">*</span></label>
                                <input type="email" class="form-control" id="formEmail" placeholder="email@example.com" required style="width:100%;" />
                            </div>

                            <div class="form-group">
                                <label class="form-label" style="font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;">Vai trò</label>
                                <input type="text" class="form-control" id="formRole" disabled style="width:100%; background:var(--surface-2); cursor:not-allowed;" />
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom:24px;">
                            <label class="form-label" style="font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;">Tên đăng nhập (Username)</label>
                            <input type="text" class="form-control" id="formUsername" disabled style="width:100%; background:var(--surface-2); cursor:not-allowed;" />
                        </div>

                        <div style="display:flex; justify-content:flex-end;">
                            <button class="btn btn-primary" id="btnSaveProfile" style="padding:10px 24px;">
                                <i class="fa-solid fa-floppy-disk" style="margin-right:8px;"></i> Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Tab 2: Đổi mật khẩu -->
        <div class="profile-tab-content" id="tab-password" style="display:none;">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <div class="card-title-icon" style="background:rgba(245,158,11,0.12); color:var(--warning); border-color:rgba(245,158,11,0.2);">
                            <i class="fa-solid fa-key"></i>
                        </div>
                        Đổi mật khẩu tài khoản
                    </div>
                </div>
                <div class="card-body" style="padding:24px;">
                    <form id="formChangePassword" onsubmit="return false;">
                        <div class="form-group" style="margin-bottom:20px;">
                            <label class="form-label" style="font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;">Mật khẩu hiện tại <span style="color:var(--danger)">*</span></label>
                            <input type="password" class="form-control" id="formOldPassword" placeholder="Nhập mật khẩu hiện tại" required style="width:100%;" />
                        </div>

                        <div class="form-group" style="margin-bottom:20px;">
                            <label class="form-label" style="font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;">Mật khẩu mới <span style="color:var(--danger)">*</span></label>
                            <input type="password" class="form-control" id="formNewPassword" placeholder="Nhập mật khẩu mới" required style="width:100%;" />
                            <small style="color:var(--text-muted); font-size:12px; margin-top:6px; display:block;">Tối thiểu 8 ký tự, nên bao gồm chữ hoa, chữ thường và số</small>
                        </div>

                        <div class="form-group" style="margin-bottom:24px;">
                            <label class="form-label" style="font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;">Xác nhận mật khẩu mới <span style="color:var(--danger)">*</span></label>
                            <input type="password" class="form-control" id="formConfirmPassword" placeholder="Nhập lại mật khẩu mới" required style="width:100%;" />
                        </div>

                        <div style="display:flex; justify-content:flex-end;">
                            <button class="btn btn-warning" id="btnSavePassword" style="padding:10px 24px; color: #fff;">
                                <i class="fa-solid fa-check" style="margin-right:8px;"></i> Thay đổi mật khẩu
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

</div>
