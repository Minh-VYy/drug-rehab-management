<div class="notification-page notification-mail-page">
  <div class="notification-mail-shell">
    <aside class="notification-mail-list-pane">
      <div class="notification-mail-toolbar">
        <div class="notification-mail-title">
          <span class="notification-mail-title-icon"><i class="fa-solid fa-inbox"></i></span>
          <span>Thông báo</span>
        </div>

        <div class="notification-mail-actions">
          <button class="btn-icon notification-refresh-btn" id="btnMarkAllRead" title="Đánh dấu tất cả đã đọc" type="button">
            <i class="fa-solid fa-check-double"></i>
          </button>
        </div>
      </div>

      <div class="notification-mail-search-row">
        <div class="search-box notification-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="notificationSearchInput" type="text" placeholder="Tìm thông báo..." />
        </div>
      </div>

      <div class="notification-segments" role="tablist" aria-label="Bộ lọc thông báo">
        <button class="notification-filter active" data-filter="all" type="button">
          Tất cả
        </button>
        <button class="notification-filter" data-filter="unread" type="button">
          Chưa đọc <span id="unreadCountBadge" hidden>0</span>
        </button>
        <button class="notification-filter" data-filter="priority" type="button">
          Cần chú ý
        </button>
      </div>

      <div class="notification-list" id="notificationList"></div>

      <div class="notification-empty" id="notificationEmpty" hidden>
        <div class="notification-empty-icon"><i class="fa-regular fa-bell-slash"></i></div>
        <h3 id="notificationEmptyTitle">Không có thông báo phù hợp</h3>
        <p id="notificationEmptyText">Thử đổi bộ lọc hoặc từ khóa tìm kiếm.</p>
      </div>
    </aside>

    <section class="notification-mail-reader" id="notificationDetailCard">
      <div class="notification-detail-empty" id="notificationDetailEmpty">
        <div class="notification-detail-empty-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
        <h3>Chọn một thông báo</h3>
        <p>Nội dung đầy đủ của thông báo sẽ hiển thị tại đây.</p>
      </div>

      <article class="notification-detail" id="notificationDetail" hidden>
        <header class="notification-detail-top">
          <div class="notification-detail-icon" id="notificationDetailIcon">
            <i class="fa-solid fa-info"></i>
          </div>
          <div class="notification-detail-heading">
            <div class="notification-detail-status-row">
              <span class="badge" id="notificationDetailStatus">Chưa đọc</span>
              <span id="notificationDetailTime">Vừa xong</span>
            </div>
            <h3 id="notificationDetailTitle">Tiêu đề thông báo</h3>
          </div>
        </header>

        <div class="notification-detail-meta">
          <div>
            <span>Mã thông báo</span>
            <strong id="notificationDetailId">-</strong>
          </div>
          <div>
            <span>Loại</span>
            <strong id="notificationDetailType">Thông tin</strong>
          </div>
        </div>

        <div class="notification-detail-body rich-notification-content" id="notificationDetailBody"></div>

        <div class="notification-detail-actions">
          <button class="btn btn-primary" id="btnDetailMarkRead" type="button">
            <i class="fa-solid fa-check"></i>
            Đánh dấu đã đọc
          </button>
        </div>
      </article>
    </section>
  </div>
</div>
