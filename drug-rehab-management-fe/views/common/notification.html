<div class="notification-container">
    <div class="notification-header">
        <h2 style="color: #fff; font-size: 1.5rem; margin: 0;"><i class="fa-solid fa-bell"></i> Hộp thư Thông báo</h2>
        <div class="notification-filters">
            <button class="btn btn-outline btn-sm active" id="filterAll">Tất cả</button>
            <button class="btn btn-outline btn-sm" id="filterUnread">Chưa đọc <span class="badge badge-red" id="unreadCountBadge">0</span></button>
            <button class="btn btn-ghost btn-sm" id="btnMarkAllRead"><i class="fa-solid fa-check-double"></i> Đánh dấu đã đọc tất cả</button>
        </div>
    </div>

    <div class="glass-panel" style="padding: 1rem;">
        <div class="notification-list" id="notificationList">
            <!-- JS Render -->
        </div>
        <div id="notificationEmpty" style="display: none; text-align: center; padding: 4rem 2rem;">
            <i class="fa-regular fa-bell-slash" style="font-size: 4rem; color: rgba(255,255,255,0.1); margin-bottom: 1rem;"></i>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Bạn không có thông báo nào.</p>
        </div>
    </div>
</div>
