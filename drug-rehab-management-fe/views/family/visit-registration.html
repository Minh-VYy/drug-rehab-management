
<div class="page-header" style="display:flex; justify-content:space-between; align-items:flex-end;">
    <div class="page-title-group">
        <h2 class="page-title"><i class="fa-solid fa-calendar-check"></i> Lịch thăm gặp</h2>
        <p class="page-subtitle">Theo dõi và đăng ký lịch thăm gặp học viên tại trung tâm.</p>
    </div>
    <button class="btn btn-primary" onclick="VisitRegistrationPage.openRegisterModal()">
        <i class="fa-solid fa-calendar-plus"></i> Đăng ký mới
    </button>
</div>

<!-- Stats -->
<div class="visit-stat-grid">
    <div class="visit-stat-card">
        <div class="visit-stat-icon" style="background:rgba(16,185,129,0.1); color:var(--success);">
            <i class="fa-solid fa-calendar-day"></i>
        </div>
        <div class="visit-stat-info">
            <h4>Lượt thăm tháng này</h4>
            <div class="val">2 / 4</div>
        </div>
    </div>
    <div class="visit-stat-card">
        <div class="visit-stat-icon" style="background:rgba(21,94,239,0.1); color:var(--primary);">
            <i class="fa-solid fa-clock-rotate-left"></i>
        </div>
        <div class="visit-stat-info">
            <h4>Đang chờ duyệt</h4>
            <div class="val">1</div>
        </div>
    </div>
    <div class="visit-stat-card">
        <div class="visit-stat-icon" style="background:rgba(245,158,11,0.1); color:var(--warning);">
            <i class="fa-solid fa-people-arrows"></i>
        </div>
        <div class="visit-stat-info">
            <h4>Học viên</h4>
            <div class="val" style="font-size:1.4em;">Trần Văn B</div>
        </div>
    </div>
</div>

<!-- List of visits -->
<h3 style="margin-bottom:20px; color:var(--text-dark); font-size:1.1em;">Danh sách đăng ký</h3>
<div class="visit-cards" id="visit-cards-container">
    <!-- JS Rendered -->
</div>

<!-- Modal -->
<div class="modal-overlay" id="visitModal">
    <div class="modal-container" style="max-width:550px;">
        <div class="modal-header">
            <h3 class="modal-title" id="visitModalTitle">Đăng ký lịch thăm</h3>
            <button class="modal-close" onclick="Modal.close('visitModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Học viên thăm gặp</label>
                <input type="text" class="form-control" value="Trần Văn B (NCN-002)" disabled>
            </div>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                    <label class="form-label">Người đi thăm chính <span class="required">*</span></label>
                    <input type="text" class="form-control" id="visit-main-person" placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label class="form-label">Số điện thoại <span class="required">*</span></label>
                    <input type="text" class="form-control" id="visit-phone" placeholder="0901234567">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Số lượng người thân đi cùng</label>
                <select class="form-control" id="visit-count">
                    <option value="1">1 người (Chỉ người đăng ký)</option>
                    <option value="2">2 người</option>
                    <option value="3">3 người (Tối đa)</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Ngày dự kiến <span class="required">*</span></label>
                <input type="date" class="form-control" id="visit-date">
            </div>

            <div class="form-group">
                <label class="form-label">Ca thăm <span class="required">*</span></label>
                <div class="shift-selector">
                    <div class="shift-option" id="shift-morning" onclick="VisitRegistrationPage.selectShift('morning')">
                        <div class="shift-icon"><i class="fa-regular fa-sun"></i></div>
                        <strong>Ca Sáng</strong>
                        <div style="font-size:0.85em; color:var(--text-muted);">08:00 - 11:00</div>
                    </div>
                    <div class="shift-option" id="shift-afternoon" onclick="VisitRegistrationPage.selectShift('afternoon')">
                        <div class="shift-icon"><i class="fa-solid fa-cloud-sun"></i></div>
                        <strong>Ca Chiều</strong>
                        <div style="font-size:0.85em; color:var(--text-muted);">14:00 - 16:30</div>
                    </div>
                </div>
                <input type="hidden" id="visit-shift" value="">
            </div>

            <div class="form-group">
                <label class="form-label">Đồ vật gửi kèm (Nếu có)</label>
                <textarea class="form-control" id="visit-items" rows="2" placeholder="Quần áo, sách báo... (Trung tâm sẽ kiểm tra trước khi chuyển)"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="Modal.close('visitModal')">Hủy</button>
            <button class="btn btn-primary" onclick="VisitRegistrationPage.submitVisit()">
                <i class="fa-solid fa-paper-plane"></i> Gửi đăng ký
            </button>
        </div>
    </div>
</div>
