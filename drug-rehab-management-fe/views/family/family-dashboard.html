<div class="card mt-2">
    <div class="card-header">
        <h3 id="family-student-name">Thông tin Học viên: </h3>
        <div id="family-status-badge"></div>
    </div>
    <div class="card-body">
        <div class="detail-row">
            <div class="detail-label">Mã học viên:</div>
            <div class="detail-value" id="family-student-id"></div>
        </div>
        <div class="detail-row">
            <div class="detail-label">Ngày sinh:</div>
            <div class="detail-value" id="family-dob"></div>
        </div>
        <div class="detail-row">
            <div class="detail-label">Ngày tiếp nhận:</div>
            <div class="detail-value" id="family-entry"></div>
        </div>
        <div class="detail-row">
            <div class="detail-label">Giai đoạn:</div>
            <div class="detail-value" id="family-stage"></div>
        </div>
        <div class="detail-row">
            <div class="detail-label">Phòng:</div>
            <div class="detail-value" id="family-room"></div>
        </div>
        
        <div class="mt-3">
            <button class="btn btn-primary" id="btn-register-visit">
                <i class="fa-solid fa-calendar-plus"></i> Đăng ký thăm gặp
            </button>
            <button class="btn btn-outline ml-2" id="btn-support-request">
                <i class="fa-solid fa-headset"></i> Gửi yêu cầu hỗ trợ
            </button>
        </div>
    </div>
</div>
