<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="frontend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="backend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="database" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#334155"/>
    </marker>
    <style>
      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 42px;
        font-weight: 800;
        fill: #0f172a;
      }
      .subtitle {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 500;
        fill: #64748b;
      }
      .card-title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 27px;
        font-weight: 800;
        fill: #ffffff;
      }
      .card-desc {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 600;
        fill: rgba(255, 255, 255, 0.9);
      }
      .chip {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
        font-weight: 700;
        fill: #0f172a;
      }
      .arrow-label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 17px;
        font-weight: 800;
        fill: #334155;
      }
      .note {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 16px;
        font-weight: 600;
        fill: #475569;
      }
    </style>
  </defs>

  <rect width="1400" height="820" rx="36" fill="url(#bg)"/>

  <circle cx="118" cy="136" r="86" fill="#dbeafe" opacity="0.72"/>
  <circle cx="1266" cy="672" r="118" fill="#dcfce7" opacity="0.72"/>
  <circle cx="1262" cy="134" r="64" fill="#fce7f3" opacity="0.68"/>

  <text x="700" y="86" text-anchor="middle" class="title">Sơ đồ kiến trúc tổng thể hệ thống</text>
  <text x="700" y="124" text-anchor="middle" class="subtitle">
    Frontend gọi REST API, Backend xử lý nghiệp vụ và truy vấn SQL Server Database
  </text>

  <!-- Frontend card -->
  <g filter="url(#shadow)">
    <rect x="80" y="260" width="330" height="250" rx="28" fill="url(#frontend)"/>
    <circle cx="142" cy="332" r="34" fill="rgba(255,255,255,0.2)"/>
    <path d="M124 330 L142 312 L160 330 M142 314 L142 354 M122 354 L162 354" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="246" y="324" text-anchor="middle" class="card-title">Frontend</text>
    <text x="246" y="358" text-anchor="middle" class="card-desc">HTML / CSS / JavaScript</text>
    <rect x="116" y="410" width="258" height="54" rx="18" fill="#ffffff" opacity="0.95"/>
    <text x="245" y="444" text-anchor="middle" class="chip">Giao diện người dùng</text>
  </g>

  <!-- Backend card -->
  <g filter="url(#shadow)">
    <rect x="535" y="260" width="330" height="250" rx="28" fill="url(#backend)"/>
    <circle cx="597" cy="332" r="34" fill="rgba(255,255,255,0.2)"/>
    <path d="M580 325 H614 M580 340 H614 M588 310 H606 M588 355 H606" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <text x="700" y="324" text-anchor="middle" class="card-title">Backend</text>
    <text x="700" y="358" text-anchor="middle" class="card-desc">Java / Spring Boot</text>
    <rect x="571" y="410" width="258" height="54" rx="18" fill="#ffffff" opacity="0.95"/>
    <text x="700" y="444" text-anchor="middle" class="chip">REST API + nghiệp vụ</text>
  </g>

  <!-- Database card -->
  <g filter="url(#shadow)">
    <rect x="990" y="260" width="330" height="250" rx="28" fill="url(#database)"/>
    <circle cx="1052" cy="332" r="34" fill="rgba(255,255,255,0.2)"/>
    <ellipse cx="1052" cy="318" rx="25" ry="11" fill="none" stroke="#fff" stroke-width="7"/>
    <path d="M1027 318 V354 C1027 360 1038 366 1052 366 C1066 366 1077 360 1077 354 V318" fill="none" stroke="#fff" stroke-width="7"/>
    <path d="M1027 336 C1027 342 1038 348 1052 348 C1066 348 1077 342 1077 336" fill="none" stroke="#fff" stroke-width="7"/>
    <text x="1156" y="324" text-anchor="middle" class="card-title">Database</text>
    <text x="1156" y="358" text-anchor="middle" class="card-desc">SQL Server</text>
    <rect x="1026" y="410" width="258" height="54" rx="18" fill="#ffffff" opacity="0.95"/>
    <text x="1155" y="444" text-anchor="middle" class="chip">Lưu trữ dữ liệu</text>
  </g>

  <!-- Arrows -->
  <path d="M420 356 C458 338 492 338 525 356" stroke="#334155" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="431" y="290" width="90" height="38" rx="19" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="476" y="315" text-anchor="middle" class="arrow-label">REST API</text>

  <path d="M875 356 C913 338 947 338 980 356" stroke="#334155" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
  <rect x="888" y="290" width="84" height="38" rx="19" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="930" y="315" text-anchor="middle" class="arrow-label">Query</text>

  <path d="M980 424 C944 444 913 444 875 424" stroke="#64748b" stroke-width="4" stroke-dasharray="10 10" fill="none" marker-end="url(#arrow)"/>
  <text x="930" y="486" text-anchor="middle" class="note">Kết quả dữ liệu</text>

  <path d="M525 424 C489 444 458 444 420 424" stroke="#64748b" stroke-width="4" stroke-dasharray="10 10" fill="none" marker-end="url(#arrow)"/>
  <text x="475" y="486" text-anchor="middle" class="note">JSON Response</text>

  <!-- Bottom flow -->
  <g>
    <rect x="146" y="610" width="1108" height="94" rx="24" fill="#ffffff" stroke="#dbe4f0"/>
    <text x="700" y="652" text-anchor="middle" class="note">
      Luồng xử lý: Người dùng thao tác trên giao diện → Frontend gửi request → Backend kiểm tra nghiệp vụ
    </text>
    <text x="700" y="682" text-anchor="middle" class="note">
      → Backend đọc/ghi SQL Server → Trả dữ liệu về Frontend để hiển thị
    </text>
  </g>
</svg>
